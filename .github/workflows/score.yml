name: PR-Gauntlet Score (gl)

on:
  pull_request_target:
    branches: [v1-bugged]
  push:
    branches: [v1-bugged]

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Get changed files (PR only)
        if: github.event_name == 'pull_request_target'
        run: |
          git fetch origin v1-bugged --depth=1
          git diff --name-only FETCH_HEAD HEAD > /tmp/changed_files.txt
          git diff --stat FETCH_HEAD HEAD -- app/ \
            | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+' > /tmp/diff_insertions.txt || echo 0 > /tmp/diff_insertions.txt
          echo "Changed files:"; cat /tmp/changed_files.txt

      - name: Validate submission (PR only)
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const violations = [];

            // Rate limit: 5 submissions per user per 24h
            const user = pr.user.login;
            const { data: allPRs } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'all', per_page: 100,
            });
            const oneDayAgo = new Date(Date.now() - 86400000).toISOString();
            const recent = allPRs.filter(p => p.user.login === user && p.created_at > oneDayAgo);
            if (recent.length > 5) violations.push(`Rate limit: ${recent.length}/5 submissions in 24h`);

            // File checks via git diff (avoids merge-base staleness of listFiles API)
            const changed = fs.readFileSync('/tmp/changed_files.txt', 'utf8').trim().split('\n').filter(Boolean);

            // Only app/ allowed
            const outOfScope = changed.filter(f => !f.startsWith('app/'));
            if (outOfScope.length) violations.push(`Files outside app/: ${outOfScope.slice(0,5).join(', ')}`);

            // Only .html files (this is a single-file ThreeJS app)
            const wrongLang = changed.filter(f => f.startsWith('app/') && !f.endsWith('.html'));
            if (wrongLang.length) violations.push(`Non-.html files in app/: ${wrongLang.slice(0,5).join(', ')}`);

            // File count
            if (changed.length > 10) violations.push(`Too many changed files: ${changed.length} (only app/index.html should change)`);

            // Diff size
            const insertions = parseInt(fs.readFileSync('/tmp/diff_insertions.txt', 'utf8').trim()) || 0;
            if (insertions > 2000) violations.push(`Diff too large: ${insertions} insertions (max 2000)`);

            if (violations.length > 0) {
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner, repo: context.repo.repo,
                body: '## PR-Gauntlet: Submission Rejected\n\n' + violations.map(v=>`- ${v}`).join('\n') + '\n\n_Fix these issues and push again._',
              });
              core.setFailed(violations.join('; '));
            }

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Lock scoring files to v1-bugged
        run: git fetch origin v1-bugged && git checkout FETCH_HEAD -- scoring/

      - name: Run scorer
        id: score
        run: |
          npx playwright test scoring/ --config scoring/playwright.config.js --reporter=json 2>/dev/null \
            | node scoring/scorer.js > /tmp/score.json || node scoring/scorer.js < /dev/null > /tmp/score.json
          cat /tmp/score.json
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/score.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          FINAL=$(node -e "console.log(require('/tmp/score.json').finalScore)")
          echo "final=$FINAL" >> $GITHUB_OUTPUT

      - name: Score summary (push)
        if: github.event_name == 'push'
        run: |
          echo "### PR-Gauntlet Score (gl): ${{ steps.score.outputs.final }}/110" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }} @ ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Post score comment (PR only)
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const result = JSON.parse(process.env.SCORE_JSON);
            const { fixed, total, baseScore, chainBonus, finalScore, results } = result;
            const rows = results.map(r =>
              `| ${r.id} | ${r.title} | T${r.tier} | ${r.passed ? 'PASS' : 'fail'} |`
            ).join('\n');
            const chainNote = chainBonus === 10
              ? 'Chain solved — root cause found, all 5 chain issues resolved!'
              : chainBonus === 5 ? 'Partial chain resolved' : 'Chain not solved';
            const lines = [
              `## PR-Gauntlet Score (gl): ${finalScore}/110`,
              '',
              `${fixed}/${total} issues fixed | Base: ${baseScore} | Chain bonus: +${chainBonus}`,
              '',
              chainNote,
              '',
              '| # | Issue | Tier | Status |',
              '|---|-------|------|--------|',
              rows,
              '',
              'Run `npx playwright test scoring/ --config scoring/playwright.config.js` locally to debug.',
              '',
              '_PRs are scored but not merged — `v1-bugged` stays frozen as the benchmark baseline._',
            ];
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: lines.join('\n'),
            });
        env:
          SCORE_JSON: "${{ steps.score.outputs.result }}"

      - name: Update leaderboard (PR only)
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const finalScore = parseInt('${{ steps.score.outputs.final }}');
            if (finalScore < 30) return;

            const result = JSON.parse(process.env.SCORE_JSON);
            const { fixed, total, chainBonus } = result;
            const agent = context.payload.pull_request.head.ref;
            const date = new Date().toISOString().split('T')[0];
            const scoreStr = `${finalScore}/110`;
            const chainStr = chainBonus > 0 ? `+${chainBonus}` : '0';

            let fileData;
            try {
              ({ data: fileData } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: 'LEADERBOARD.md', ref: 'master',
              }));
            } catch (e) { console.log('Could not fetch LEADERBOARD.md:', e.message); return; }

            const current = Buffer.from(fileData.content, 'base64').toString('utf8');
            const tableRe = /(\| Rank \|[^\n]+\n\|[-| ]+\|)((?:\n\|[^\n]+)*)/;
            const match = current.match(tableRe);
            if (!match) { console.log('Table not found'); return; }

            const existingRows = match[2].trim().split('\n').filter(r => r.trim().startsWith('|'));
            const parseScore = row => parseInt((row.split('|').map(c=>c.trim()).filter(Boolean)[5]||'').split('/')[0])||0;
            const scores = existingRows.map(parseScore);
            const wouldRank = scores.filter(s => s > finalScore).length + 1;
            if (wouldRank > 10) { console.log(`Rank #${wouldRank} outside top 10`); return; }

            const newRow = `| ${wouldRank} | ${agent} | Hard | ${fixed}/${total} | ${chainStr} | ${scoreStr} | — | ${date} |`;
            const reranked = [...existingRows.slice(0, wouldRank-1), newRow, ...existingRows.slice(wouldRank-1)]
              .slice(0, 10).map((row, i) => row.replace(/^\| \d+/, `| ${i+1}`));
            const updated = current.replace(tableRe, match[1] + '\n' + reranked.join('\n'));
            if (updated === current) { console.log('No change needed'); return; }

            try {
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner, repo: context.repo.repo,
                path: 'LEADERBOARD.md',
                message: `leaderboard: ${agent} scores ${scoreStr} (rank #${wouldRank})`,
                content: Buffer.from(updated).toString('base64'),
                sha: fileData.sha, branch: 'master',
              });
              console.log(`Leaderboard updated — ${agent} at rank #${wouldRank}`);
            } catch (e) { console.log('Leaderboard update failed (race):', e.message); }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner, repo: context.repo.repo,
              body: `**Leaderboard:** \`${agent}\` entered at **rank #${wouldRank}** with **${scoreStr}**!`,
            });
        env:
          SCORE_JSON: "${{ steps.score.outputs.result }}"
